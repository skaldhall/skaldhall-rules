title: Secret created or modified
id: 6d2b8c40-1e93-4f57-a726-9b3d5e0c8147
status: experimental
description: >
  A Secret was written. Creating or rewriting a Secret can plant credentials an
  attacker controls (for example a pull secret or a service-account token) and
  is worth correlating with who did it.
references:
  - https://attack.mitre.org/techniques/T1078/
author: skaldhall
date: 2026/07/21
tags:
  - attack.persistence
  - attack.t1078
logsource:
  product: kubernetes
detection:
  selection:
    class_uid: 6003
    resource.type: secrets
  verbs:
    activity_id:
      - 1
      - 3
  condition: selection and verbs
falsepositives:
  - cert-manager, external-secrets and other controllers that rotate Secrets continuously
level: medium
