title: ServiceAccount created in kube-system
id: 9777cb3f-850d-5bcc-93b4-58d235d5d624
status: experimental
description: 'A new service account in kube-system is a control-plane-adjacent identity an

  attacker can bind powerful roles to. Should only appear during upgrades.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.persistence
- attack.t1136
logsource:
  product: kubernetes
detection:
  base:
    class_uid: 6003
  verbs:
    activity_id: 1
  res_watch:
    api.resource.type: serviceaccounts
  res_audit:
    resource.type: serviceaccounts
  nskube:
  - api.resource.namespace: kube-system
  - resource.namespace: kube-system
  condition: base and verbs and (res_watch or res_audit) and 1 of nskube
falsepositives:
- Cluster upgrades — whitelist by actor.user.name
level: high
