title: Secrets listed or bulk-deleted by a user
id: dcd3ca57-6618-5a0a-b890-90ad8d69f85d
status: experimental
description: 'Listing all secrets in a namespace, or deletecollection over them, is either

  credential harvesting or destruction. Controllers do this as system service

  accounts and are excluded; a human or workload identity doing it is not routine.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.credential_access
- attack.t1552.007
logsource:
  product: kubernetes
detection:
  selection:
    class_uid: 6003
    api.operation:
    - list
    - deletecollection
  res:
    resource.type: secrets
  exclusion:
    actor.user.name|startswith: 'system:'
  condition: selection and res and not exclusion
falsepositives:
- Backup or secret-sync tools running under a non-system identity — whitelist by actor
level: high
