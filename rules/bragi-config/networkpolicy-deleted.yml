title: NetworkPolicy deleted
id: 9a4d1e72-3b58-4c07-8f21-5d6e0b9a2c48
status: experimental
description: >
  A NetworkPolicy was deleted. Removing segmentation is a classic step before
  lateral movement — the workloads the policy covered are now reachable by (and
  can reach) anything the remaining policies allow, which in a namespace without
  default-deny means everything.
references:
  - https://attack.mitre.org/techniques/T1562/007/
author: skaldhall
date: 2026/07/18
tags:
  - attack.defense_evasion
  - attack.t1562.007
logsource:
  product: kubernetes
detection:
  base:
    class_uid: 6003
    activity_id: 4
  # Two producers emit OCSF 6003 for a Kubernetes object and they nest the
  # resource differently: the kube-apiserver audit source puts it at
  # `resource.type`, the operator's state-watch inventory at
  # `api.resource.type`. Matching only one silently halves the detection — and
  # it was the audit shape, the only one that names the human, that was missed.
  res_audit:
    resource.type: networkpolicies
  res_watch:
    api.resource.type: networkpolicies
  condition: base and (res_audit or res_watch)
falsepositives:
  - Legitimate policy refactors and helm upgrades delete and recreate policies
level: high
