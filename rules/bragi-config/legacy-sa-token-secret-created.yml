title: Legacy service-account-token Secret created
id: 8c7d08bf-09c1-5a0f-b2c1-10e9119b3c5f
status: experimental
description: 'A Secret of type kubernetes.io/service-account-token is a NON-expiring

  credential. Modern clusters use short-lived projected tokens; manually creating

  a static one is persistence. (Needs audit Request-level body.)

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.persistence
- attack.credential_access
- attack.t1528
logsource:
  product: kubernetes
detection:
  selection:
    class_uid: 6003
    activity_id: 1
  res:
    resource.type: secrets
  typ:
    request_object.type: kubernetes.io/service-account-token
  condition: selection and res and typ
falsepositives:
- Legacy tooling that still provisions static tokens — whitelist by actor
level: high
