title: Kubernetes secret read by user identity
id: 9e8d7c6b-5a4f-3210-edcb-a987654321fe
status: experimental
description: A user (not a serviceaccount) read a Kubernetes Secret.
references:
  - https://attack.mitre.org/techniques/T1552/007/
author: skaldhall
date: 2026/05/10
tags:
  - attack.credential_access
  - attack.t1552.007
logsource:
  product: kubernetes
  service: audit
detection:
  base:
    class_uid: 6003
    api.operation: get
  res_audit:
    resource.type: secrets
  res_watch:
    api.resource.type: secrets
  exclusion:
    actor.user.name|startswith: 'system:serviceaccount:'
  condition: base and (res_audit or res_watch) and not exclusion
falsepositives:
  - Cluster admins routinely inspecting secrets
level: medium
