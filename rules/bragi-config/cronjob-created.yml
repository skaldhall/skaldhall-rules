title: CronJob created or modified
id: 0a9d3f26-5c71-4b84-8e05-2f6b1c9a4e73
status: experimental
description: >
  A CronJob was created or updated. A scheduled workload is the cleanest
  persistence mechanism in Kubernetes — it survives pod eviction and restarts
  itself on the cluster's own schedule.
references:
  - https://attack.mitre.org/techniques/T1053/007/
author: skaldhall
date: 2026/07/21
tags:
  - attack.persistence
  - attack.t1053.007
logsource:
  product: kubernetes
detection:
  base:
    class_uid: 6003
  verbs:
    activity_id:
      - 1
      - 3
  res_audit:
    resource.type: cronjobs
  res_watch:
    api.resource.type: cronjobs
  condition: base and verbs and (res_audit or res_watch)
falsepositives:
  - Normal application deployments that ship CronJobs
level: medium
