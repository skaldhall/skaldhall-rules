title: Binding to cluster-admin created or changed
id: 5e8b3f91-7d24-4a6c-9e05-1c4f8a2d7b63
status: experimental
description: >
  A ClusterRoleBinding referencing cluster-admin (or a wildcard-equivalent role)
  was created or modified. Granting cluster-admin is the single highest-impact
  RBAC change possible — the subject owns the cluster.
references:
  - https://attack.mitre.org/techniques/T1098/
author: skaldhall
date: 2026/07/18
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.t1098
logsource:
  product: kubernetes
detection:
  base:
    class_uid: 6003
  verbs:
    activity_id:
      - 1
      - 3
  # The state-watch inventory resolves the binding and flags it; the audit
  # record has no summary, but it does carry the submitted object, where the
  # same fact is the roleRef.
  watch_admin:
    api.resource.type: clusterrolebindings
    summary.cluster_admin: true
  audit_admin:
    resource.type: clusterrolebindings
    request_object.roleRef.name: cluster-admin
  condition: base and verbs and (watch_admin or audit_admin)
falsepositives:
  - Cluster bootstrap and some operators legitimately bind cluster-admin
level: high
