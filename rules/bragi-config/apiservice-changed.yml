title: APIService registered or changed
id: ada869bc-4914-51af-b581-4e112139a2e3
status: experimental
description: 'An aggregated APIService reroutes part of the Kubernetes API to a chosen backend

  service. Registering or repointing one lets an attacker MITM API calls

  (including credential-bearing ones).

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.credential_access
- attack.defense_evasion
- attack.t1557
logsource:
  product: kubernetes
detection:
  base:
    class_uid: 6003
  verbs:
    activity_id:
    - 1
    - 3
  res_watch:
    api.resource.type: apiservices
  res_audit:
    resource.type: apiservices
  condition: base and verbs and (res_watch or res_audit)
falsepositives:
- metrics-server and other legitimate aggregated APIs during install — whitelist by actor
level: high
