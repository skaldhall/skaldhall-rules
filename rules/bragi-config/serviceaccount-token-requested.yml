title: ServiceAccount API token requested
id: 192c5f64-df5f-5d34-93ca-c45ed8b58ea0
status: experimental
description: 'A TokenRequest mints a bearer token for a service account. Unexpected requests

  by a human or non-node principal can indicate credential harvesting. The kubelet

  (system:node:*) mints its node SA token constantly and is excluded here;

  controllers (system:serviceaccount:*) still fire — whitelist the known ones by

  actor.user.name.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.credential_access
- attack.t1528
logsource:
  product: kubernetes
detection:
  selection:
    class_uid: 6003
    api.operation: create
  path:
    http_request.url.path|endswith: /token
  sapath:
    http_request.url.path|contains: /serviceaccounts/
  kubelet:
    actor.user.name|startswith: 'system:node:'
  condition: selection and path and sapath and not kubelet
falsepositives:
- Controllers minting tokens (system:serviceaccount:*) — whitelist by actor.user.name
level: medium
