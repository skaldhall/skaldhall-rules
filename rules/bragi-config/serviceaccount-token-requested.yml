title: ServiceAccount API token requested
id: 192c5f64-df5f-5d34-93ca-c45ed8b58ea0
status: experimental
description: 'A TokenRequest mints a bearer token for a service account. Unexpected requests

  by a human principal can indicate credential harvesting; kubelet/controllers do

  this constantly and are whitelisted by their system:* identity.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.credential_access
- attack.t1528
logsource:
  product: kubernetes
detection:
  selection:
    class_uid: 6003
    api.operation: create
  path:
    http_request.url.path.keyword|endswith: /token
  sapath:
    http_request.url.path.keyword|contains: /serviceaccounts/
  condition: selection and path and sapath
falsepositives:
- kubelet/controllers minting tokens (system:* principals) — whitelist by actor.user.name
level: medium
