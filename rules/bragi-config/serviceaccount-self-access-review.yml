title: Workload enumerated its own permissions
id: e5eacadc-2af8-52ee-86b9-2029e1eb1222
status: experimental
description: 'A SelfSubjectAccessReview/SelfSubjectRulesReview asks ''what can I do?''. A human

  running kubectl auth can-i is routine and excluded; a SERVICE ACCOUNT doing it

  is a workload enumerating its RBAC — classic post-exploitation recon from inside

  a compromised pod.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.discovery
- attack.t1069
logsource:
  product: kubernetes
detection:
  selection:
    class_uid: 6003
    activity_id: 1
  res:
    resource.type:
    - selfsubjectaccessreviews
    - selfsubjectrulesreviews
  actor:
    actor.user.name|startswith: 'system:serviceaccount:'
  condition: selection and res and actor
falsepositives:
- Operators/controllers that preflight their permissions — whitelist by actor.user.name
level: high
