title: ServiceAccount created
id: c5fcc3e6-b914-5c13-8f6d-e7df3a1d95cf
status: experimental
description: 'A new service account is a potential persistence identity. kube-system SA

  creation has its own high rule; this is the general case.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.persistence
- attack.t1136
logsource:
  product: kubernetes
detection:
  base:
    class_uid: 6003
  verbs:
    activity_id: 1
  res_watch:
    api.resource.type: serviceaccounts
  res_audit:
    resource.type: serviceaccounts
  # Exclude the kubelet's TokenRequests (create on serviceaccounts/<name>/token),
  # which match serviceaccounts + create but are not new accounts. Matched on the
  # actor (query-index-safe), not a path wildcard which SA drops on text indices.
  kubelet:
    actor.user.name|startswith: 'system:node:'
  condition: base and verbs and (res_watch or res_audit) and not kubelet
falsepositives:
- Application installs (Helm) that create service accounts — whitelist by actor/namespace
level: medium
