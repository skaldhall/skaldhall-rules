title: Shell spawned in container (Tetragon)
id: 2b4d6f8a-0c2e-4b6d-8a0c-2e4f6a8b0c2e
status: experimental
description: Shell binary executed inside a Kubernetes container, observed via Tetragon and normalized to OCSF Process Activity (1007).
references:
  - https://tetragon.io/docs/use-cases/process-execution/
  - https://attack.mitre.org/techniques/T1059/004/
author: skaldhall
date: 2026/05/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1059.004
logsource:
  product: tetragon
  category: process_creation
detection:
  selection_class:
    class_uid: 1007
  # The binary itself is the signal. A bare `sh`/`bash` exec (kubectl exec, a
  # script spawning a shell) has NO arguments, so process.cmd_line is EMPTY —
  # matching only cmd_line misses the most common case. process.file.path is the
  # executable path (/bin/sh) and is always populated; match it by basename.
  shell_bin:
    process.file.path|endswith:
      - '/sh'
      - '/bash'
      - '/ash'
      - '/dash'
      - '/zsh'
      - '/ksh'
      - '/csh'
      - '/tcsh'
      - '/fish'
      - '/busybox'
  # Also catch a shell passed as an argument (e.g. `runc … /bin/sh`, `bash -c
  # /bin/bash`) where the launching binary is something else.
  shell_arg:
    process.cmd_line|contains:
      - '/bin/sh'
      - '/bin/bash'
      - '/bin/ash'
      - '/bin/dash'
      - '/bin/zsh'
  condition: selection_class and (shell_bin or shell_arg)
falsepositives:
  - Init containers running shell-based bootstrap scripts
  - Debug containers (kubectl debug, ephemeral containers)
  - Development namespaces
level: high
