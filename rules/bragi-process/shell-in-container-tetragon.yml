title: Shell spawned in container (Tetragon)
id: 2b4d6f8a-0c2e-4b6d-8a0c-2e4f6a8b0c2e
status: experimental
description: Shell binary executed inside a Kubernetes container, observed via Tetragon and normalized to OCSF Process Activity (1007).
references:
  - https://tetragon.io/docs/use-cases/process-execution/
  - https://attack.mitre.org/techniques/T1059/004/
author: skaldhall
date: 2026/05/10
tags:
  - attack.execution
  - attack.t1059
  - attack.t1059.004
logsource:
  product: tetragon
  category: process_creation
detection:
  selection_class:
    class_uid: 1007
  selection_shell:
    process.cmd_line|contains:
      - '/bin/sh'
      - '/bin/bash'
      - '/bin/ash'
      - '/bin/dash'
      - '/bin/zsh'
      - '/usr/bin/sh'
      - '/usr/bin/bash'
  condition: selection_class and selection_shell
falsepositives:
  - Init containers running shell-based bootstrap scripts
  - Debug containers (kubectl debug, ephemeral containers)
  - Development namespaces
level: high
