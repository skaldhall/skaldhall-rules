title: Binary executed from a writable directory
id: fdaf482c-3d2b-5c72-80de-a3720f90e869
status: experimental
description: 'An immutable container runs only the binaries baked into its image. Executing

  from /tmp, /dev/shm, /run or /var/tmp means a binary was written at runtime and

  launched — the canonical drop-and-run pattern. Highest-signal runtime rule.

  '
references:
- https://microsoft.github.io/Threat-Matrix-for-Kubernetes/
- https://tetragon.io/docs/policy-library/
author: skaldhall
date: 2026/07/21
tags:
- attack.execution
- attack.defense_evasion
- attack.t1059
logsource:
  product: linux
detection:
  selection:
    class_uid: 1007
  paths:
    process.file.path.keyword|startswith:
    - /tmp/
    - /var/tmp/
    - /dev/shm/
    - /run/
  condition: selection and paths
falsepositives:
- Build/CI pods that compile and run in a scratch dir — whitelist by workload
level: critical
