title: Credential file accessed in container
id: 7d3e8a91-2c4b-4f5e-a6d7-8e9f0a1b2c3d
status: experimental
description: A process inside a container accessed a known credential file path (k8s SA token, ssh keys, /etc/shadow, cloud metadata creds).
references:
  - https://attack.mitre.org/techniques/T1552/
author: skaldhall
date: 2026/05/10
tags:
  - attack.credential_access
  - attack.t1552
  - attack.t1552.001
  - attack.t1552.005
logsource:
  category: process_creation
detection:
  selection_class:
    class_uid: 1007
  selection_path:
    process.cmd_line.keyword|contains:
      - '/var/run/secrets/kubernetes.io/serviceaccount/token'
      - '/etc/shadow'
      - '/root/.ssh/'
      - '/root/.aws/credentials'
      - '/.kube/config'
      - '169.254.169.254'
  condition: selection_class and selection_path
falsepositives:
  - Backup operators
  - Authorized cluster admins running break-glass procedures
level: high
