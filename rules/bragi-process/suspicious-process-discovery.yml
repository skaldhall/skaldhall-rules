title: Suspicious system reconnaissance command
id: 6e1c4d2a-9f7b-4d1c-8e8f-3a2b1c0d4e5f
status: experimental
description: A process commonly used for system reconnaissance was executed inside a container.
references:
  - https://attack.mitre.org/tactics/TA0007/
author: skaldhall
date: 2026/05/10
tags:
  - attack.discovery
  - attack.t1057
  - attack.t1018
  - attack.t1083
logsource:
  category: process_creation
detection:
  selection_class:
    class_uid: 1007
  selection_recon:
    process.name|contains:
      - 'whoami'
      - 'hostname'
      - 'uname'
      - 'ifconfig'
      - 'netstat'
      - 'arp'
      - 'lsof'
      - 'ps'
  condition: selection_class and selection_recon
falsepositives:
  - Health-check sidecars
  - Diagnostic containers
level: low
