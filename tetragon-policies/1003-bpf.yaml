# Bragi TracingPolicy — eBPF operations (OCSF class 1003)
# Feeds bpf-in-container. bpf() from a container is a rootkit-class primitive.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: 1003-bpf
spec:
  kprobes:
    - call: __x64_sys_bpf
      syscall: true
      args:
        - index: 0
          type: int
    - call: __x64_sys_perf_event_open
      syscall: true
      args:
        - index: 0
          type: int
# arm64: __arm64_sys_bpf / __arm64_sys_perf_event_open.
